<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  {%- comment -%} Apply the stored theme before first paint to prevent flash. {%- endcomment -%}
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/blog-logo.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/blog-logo.svg' | relative_url }}">
  <link rel="mask-icon" href="{{ '/assets/img/blog-logo.svg' | relative_url }}" color="#b82417">
  <meta name="theme-color" content="#b82417">
  {%- feed_meta -%}
  {%- seo -%}
</head>
