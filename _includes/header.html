<header class="site-header" id="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <img class="site-logo" src="{{ '/assets/img/blog-logo.svg' | relative_url }}" alt="" width="32" height="32">
      <span class="site-title">{{ site.title }}</span>
    </a>

    <div class="site-controls">
      <nav id="site-nav" class="site-nav" aria-label="Primary">
        <a href="{{ '/posts/' | relative_url }}">Blog Posts</a>
      </nav>

      <button id="theme-toggle" class="icon-btn theme-toggle" type="button" aria-label="Toggle theme">
        <span class="theme-icon-light">☀︎</span>
        <span class="theme-icon-dark">☾</span>
      </button>

      <button id="nav-toggle" class="icon-btn nav-toggle" type="button"
              aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </div>
  </div>
</header>
