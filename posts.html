---
layout: default
title: Blog Posts
permalink: /posts/
---
<section class="posts-page">

  <ul class="post-list-full">
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
      </li>
    {% endfor %}
  </ul>
</section>
