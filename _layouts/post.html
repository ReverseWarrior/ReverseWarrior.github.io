---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {%- if page.tags.size > 0 %} · {{ page.tags | join: ", " }}{% endif -%}
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<aside class="post-toc" id="post-toc" aria-label="On this page" hidden>
  <details class="post-toc-details" open>
    <summary class="post-toc-summary">On this page</summary>
    <nav class="post-toc-nav"></nav>
  </details>
</aside>
